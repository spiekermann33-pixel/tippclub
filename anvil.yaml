allow_embedding: false
db_schema:
  fav_teams:
    client: search
    columns:
    - admin_ui: {order: 0, width: 200}
      name: team_id
      type: number
    - admin_ui: {order: 1, width: 200}
      name: team_name
      type: string
    - admin_ui: {order: 2, width: 200}
      name: logo
      type: media
    server: full
    title: fav_teams
  tips:
    client: full
    columns:
    - admin_ui: {order: 0, width: 200}
      name: gameday
      target: top_matches
      type: link_single
    - admin_ui: {order: 1, width: 200}
      name: user
      target: users
      type: link_single
    - admin_ui: {order: 2, width: 200}
      name: home_score
      type: number
    - admin_ui: {order: 3, width: 200}
      name: away_score
      type: number
    server: full
    title: tips
  top_matches:
    client: full
    columns:
    - admin_ui: {order: 0, width: 200}
      name: season
      type: string
    - admin_ui: {order: 1, width: 200}
      name: gameday
      type: number
    - admin_ui: {order: 2, width: 200}
      name: home_team
      type: string
    - admin_ui: {order: 3, width: 200}
      name: away_team
      type: string
    - admin_ui: {order: 4, width: 200}
      name: home_score
      type: number
    - admin_ui: {order: 5, width: 200}
      name: away_score
      type: number
    - admin_ui: {order: 6, width: 200}
      name: jackpot
      type: number
    server: full
    title: top_matches
  users:
    client: search
    columns:
    - admin_ui: {order: 0, width: 200}
      name: user_name
      type: string
    - admin_ui: {order: 1, width: 200}
      name: Column2
      target: fav_teams
      type: link_single
    - admin_ui: {order: 2, width: 200}
      name: user_id
      type: number
    - admin_ui: {order: 3, width: 200}
      name: sex
      type: string
    - admin_ui: {order: 4, width: 200}
      name: active
      type: bool
    server: full
    title: users
