  fav_teams:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      name: team_id
      type: number
    - admin_ui: {order: 1, width: 200}
      name: team_name
      type: string
    server: full
    title: fav_teams
  users:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      name: user_name
      type: string
    - admin_ui: {order: 1, width: 200}
      name: Column2
