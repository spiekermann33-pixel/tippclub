components:
- components:
  - layout_properties: {grid_position: 'CSZWWV,OOWBFH'}
    name: rich_text_1
    properties: {align: center, content: '##### Spieltag:'}
    type: RichText
  - event_bindings: {change: drop_down_gameday_change, show: drop_down_gameday_show}
    layout_properties: {grid_position: 'CSZWWV,VGFQNI'}
    name: drop_down_gameday
    properties: {align: full}
    type: DropDown
  - layout_properties: {grid_position: 'SHEMRB,JUKKSF'}
    name: spacer_1
    properties: {height: 32}
    type: Spacer
  - data_bindings: []
    layout_properties: {grid_position: 'QEHVNW,FUTRCG'}
    name: label_matchup
    properties: {}
    type: Label
  - layout_properties: {grid_position: 'QEHVNW,YTWOGT'}
    name: label_2
    properties: {align: right, text: 'Preisgeld:'}
    type: Label
  - layout_properties: {grid_position: 'QEHVNW,YKVVUY'}
    name: label_jackpot
    properties: {}
    type: Label
  - components:
    - layout_properties: {}
      name: repeating_panel_user_tips
      properties: {item_template: Form1.RowTemplate4, spacing_above: none, spacing_below: none}
      type: RepeatingPanel
    layout_properties: {grid_position: 'KNQUKH,VANADL'}
    name: data_grid_user_tips
    properties:
      columns:
      - {data_key: name, id: JKSDUP, title: Name}
      - {data_key: tip, id: VJQQOR, title: Tipp}
      rows_per_page: 25
    type: DataGrid
  - event_bindings: {click: button_save_click}
    layout_properties: {grid_position: 'NXNUFC,OHTEBK'}
    name: button_save
    properties: {text: Speichern}
    type: Button
  - event_bindings: {click: button_save_and_download_click}
    layout_properties: {grid_position: 'NXNUFC,LZFTVV'}
    name: button_save_and_download
    properties: {text: Speichern & Tippzettel erstellen}
    type: Button
  layout_properties: {slot: default}
  name: content_panel
  properties: {col_widths: '{}'}
  type: ColumnPanel
- components:
  - event_bindings: {click: add_new_topmatch_click}
    layout_properties: {}
    name: add_new_topmatch
    properties: {text: Neues Topspiel anlgen}
    type: Button
  layout_properties: {slot: nav-right}
  name: navbar_links
  properties: {}
  type: FlowPanel
- layout_properties: {slot: title}
  name: label_1
  properties: {text: 'Eintragen von Tipps:'}
  type: Label
container:
  properties: {html: '@theme:standard-page.html'}
  type: HtmlTemplate
is_package: true
